name: PortaPy 3.14 Verification

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hosted:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -e '.[test]'
      - name: Run complete hosted suite
        run: python -m pytest
      - name: Check public C example
        run: cc -std=c11 -Wall -Wextra -Werror -Iinclude -fsyntax-only examples/embed.c

  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install toolchain, PortaPy, and pinned asmpython
        run: |
          sudo apt-get update
          sudo apt-get install --yes nasm gcc binutils
          python -m pip install -e '.[test]'
          python -m pip install --no-cache-dir --force-reinstall \
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
      - name: Normalize standalone VM implementation
        run: |
          cp src/portapy/core/bootstrap_frontend.py src/portapy/core/frontend.py
          cp src/portapy/core/vm_impl.py src/portapy/core/vm.py
          python tools/normalize_full_core_lambdas.py
          python tools/normalize_full_core_native_semantics.py
          python tools/normalize_full_core_opcode_maps.py
          python tools/normalize_full_core_validation.py
          cp src/portapy/core/vm.py src/portapy/core/vm_impl.py
          git checkout -- src/portapy/core/frontend.py src/portapy/core/vm.py
      - name: Audit generated standalone entry
        run: |
          mkdir -p dist
          python tools/audit_standalone_generated_entry.py \
            --target linux \
            --output dist/generated-standalone-linux.py
      - name: Build canonical standalone library
        run: |
          python tools/build_native_host_calls.py \
            --standalone-vm \
            --target linux \
            --output dist/libportapy.so \
            --work-dir dist/build-linux
      - name: Audit Linux linkage
        run: |
          readelf -dW dist/libportapy.so | tee dist/linux-dynamic-section.txt
          ldd dist/libportapy.so | tee dist/linux-dependencies.txt
          if readelf -dW dist/libportapy.so | grep -q TEXTREL; then
            echo 'text relocations are forbidden'
            exit 1
          fi
          if grep -Eiq 'NEEDED.*(lib)?python|(^|[[:space:]/])libpython[0-9]' \
              dist/linux-dynamic-section.txt dist/linux-dependencies.txt; then
            echo 'standalone library must not load or link libpython'
            exit 1
          fi
      - name: Execute full Linux C matrix
        run: |
          set -e
          compile_run() {
            source="$1"
            binary="$2"
            expected="$3"
            cc -std=c11 -Wall -Wextra -Werror -Iinclude "$source" -ldl -o "dist/$binary"
            "./dist/$binary" ./dist/libportapy.so | tee "dist/$binary-output.txt"
            grep -qx "$expected" "dist/$binary-output.txt"
          }
          compile_run tests/native_host_call_host.c native_host_call_host 'native-host-calls: ok'
          compile_run tests/native_full_environment_host.c native_full_environment_host 'native-full-environment: ok'
          compile_run tests/native_tuple_host.c native_tuple_host 'native-tuples: ok'
          compile_run tests/native_dict_host.c native_dict_host 'native-dicts: ok'
          compile_run tests/native_list_host.c native_list_host 'native-lists: ok'
          compile_run tests/native_handle_host.c native_handle_host 'opaque-floats: ok'
          compile_run tests/native_import_host.c native_import_host 'native-host-imports: ok'
          compile_run tests/native_traceback_host.c native_traceback_host 'native-traceback-frames: ok'
          compile_run tests/native_full_runtime_host.c native_full_runtime_host 'native-full-runtime: ok'
      - name: Execute Linux Python facade probes
        run: |
          python tests/native_environment_adapter_probe.py dist/libportapy.so
          python tests/native_traceback_adapter_probe.py dist/libportapy.so
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: portapy-3.14-linux
          path: dist

  windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install toolchain, PortaPy, and pinned asmpython
        shell: powershell
        run: |
          choco install nasm mingw -y --no-progress
          python -m pip install -e '.[test]'
          python -m pip install --no-cache-dir --force-reinstall `
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
      - name: Normalize standalone VM implementation
        shell: powershell
        run: |
          Copy-Item src/portapy/core/bootstrap_frontend.py src/portapy/core/frontend.py -Force
          Copy-Item src/portapy/core/vm_impl.py src/portapy/core/vm.py -Force
          python tools/normalize_full_core_lambdas.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/normalize_full_core_native_semantics.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/normalize_full_core_opcode_maps.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/normalize_full_core_validation.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Copy-Item src/portapy/core/vm.py src/portapy/core/vm_impl.py -Force
          git checkout -- src/portapy/core/frontend.py src/portapy/core/vm.py
      - name: Audit generated standalone entry
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          python tools/audit_standalone_generated_entry.py `
            --target windows `
            --output dist/generated-standalone-windows.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Build canonical standalone library
        shell: powershell
        run: |
          python tools/build_native_host_calls.py `
            --standalone-vm `
            --target windows `
            --output dist/portapy.dll `
            --work-dir dist/build-windows
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Audit Windows linkage
        shell: powershell
        run: |
          $imports = & objdump -p dist/portapy.dll
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $imports | Out-File -Encoding utf8 dist/windows-imports.txt
          if ($imports -match 'DLL Name:\s*(python|libpython)[^\s]*\.dll') {
            throw 'standalone library must not load or link a Python DLL'
          }
      - name: Execute full Windows C matrix
        shell: powershell
        run: |
          function Compile-And-Run($source, $binary, $expected) {
            gcc -std=c11 -Wall -Wextra -Werror -Iinclude $source -o "dist/$binary.exe"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            $output = & "dist/$binary.exe" dist/portapy.dll
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            $output | Out-File -Encoding utf8 "dist/$binary-output.txt"
            if ($output -ne $expected) { throw "unexpected $binary output: $output" }
          }
          Compile-And-Run tests/native_host_call_host.c native_host_call_host 'native-host-calls: ok'
          Compile-And-Run tests/native_full_environment_host.c native_full_environment_host 'native-full-environment: ok'
          Compile-And-Run tests/native_tuple_host.c native_tuple_host 'native-tuples: ok'
          Compile-And-Run tests/native_dict_host.c native_dict_host 'native-dicts: ok'
          Compile-And-Run tests/native_list_host.c native_list_host 'native-lists: ok'
          Compile-And-Run tests/native_handle_host.c native_handle_host 'opaque-floats: ok'
          Compile-And-Run tests/native_import_host.c native_import_host 'native-host-imports: ok'
          Compile-And-Run tests/native_traceback_host.c native_traceback_host 'native-traceback-frames: ok'
          Compile-And-Run tests/native_full_runtime_host.c native_full_runtime_host 'native-full-runtime: ok'
      - name: Execute Windows Python facade probes
        shell: powershell
        run: |
          python tests/native_environment_adapter_probe.py dist/portapy.dll
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tests/native_traceback_adapter_probe.py dist/portapy.dll
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: portapy-3.14-windows
          path: dist
