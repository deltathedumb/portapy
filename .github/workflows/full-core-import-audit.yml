name: Full-core import audit

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install verified asmpython
        run: |
          python -m pip install --no-cache-dir --force-reinstall \
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
      - name: Audit full-core project import graph
        id: audit
        continue-on-error: true
        run: |
          mkdir -p dist
          python -m asmpython._compiler.import_audit \
            src/portapy/native_full_core_probe.py \
            > dist/full-core-import-audit.txt 2>&1
      - name: Show import audit
        if: always()
        run: cat dist/full-core-import-audit.txt
      - name: Report failed import audit
        if: steps.audit.outcome != 'success' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '<!-- portapy-full-core-import-audit -->'
            echo '### Full-core import audit'
            echo
            echo '```text'
            cat dist/full-core-import-audit.txt
            echo '```'
          } > /tmp/portapy-full-core-import-audit.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file /tmp/portapy-full-core-import-audit.md
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-core-import-audit
          path: dist/full-core-import-audit.txt
      - name: Require a clean import graph
        if: steps.audit.outcome != 'success'
        run: exit 1
