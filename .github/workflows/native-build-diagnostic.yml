name: Native build diagnostic

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: native-build-diagnostic-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    outputs:
      status: ${{ steps.build.outputs.status }}
      report: ${{ steps.build.outputs.report }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install quietly
        shell: bash
        run: |
          sudo apt-get update > /tmp/install.log 2>&1
          sudo apt-get install --yes nasm gcc binutils >> /tmp/install.log 2>&1
          python -m pip install -e '.[test]' >> /tmp/install.log 2>&1
          python -m pip install --no-cache-dir --force-reinstall \
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1' \
            >> /tmp/install.log 2>&1
      - name: Capture compiler diagnostic
        id: build
        shell: bash
        run: |
          set +e
          python tools/build_native_typed.py \
            --target linux \
            --output /tmp/libportapy.so \
            --work-dir /tmp/build-linux \
            > /tmp/build.log 2>&1
          status=$?
          {
            echo '=== FIRST 35 LINES ==='
            head -n 35 /tmp/build.log
            echo
            echo '=== ERROR-LIKE LINES ==='
            grep -Ein 'error|failed|failure|unsupported|traceback|exception|undefined|invalid' \
              /tmp/build.log | tail -n 120 || true
            echo
            echo '=== FINAL 120 LINES ==='
            tail -n 120 /tmp/build.log
          } > /tmp/report.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo 'report<<PORTAPY_BUILD_REPORT' >> "$GITHUB_OUTPUT"
          cat /tmp/report.log >> "$GITHUB_OUTPUT"
          echo 'PORTAPY_BUILD_REPORT' >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload normalized compiler input
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-build-diagnostic-source
          path: |
            /tmp/build.log
            /tmp/report.log
            src/portapy/native_full_reference_entry.py
            src/portapy/core/frontend.py
            src/portapy/core/vm.py
            src/portapy/core/loader.py
            src/portapy/core/bytecode.py

  report-linux:
    needs: build-linux
    runs-on: ubuntu-22.04
    steps:
      - name: Report compiler diagnostic
        env:
          BUILD_REPORT: ${{ needs.build-linux.outputs.report }}
          BUILD_STATUS: ${{ needs.build-linux.outputs.status }}
        shell: bash
        run: |
          printf '%s\n' "$BUILD_REPORT"
          exit "$BUILD_STATUS"

  build-windows:
    runs-on: windows-2022
    outputs:
      status: ${{ steps.build.outputs.status }}
      report: ${{ steps.build.outputs.report }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install quietly
        shell: powershell
        run: |
          $installLog = Join-Path $env:RUNNER_TEMP 'portapy-install-windows.log'
          & .\tools\install_windows_toolchain.ps1 *>> $installLog
          if ($LASTEXITCODE -ne 0) { Get-Content $installLog; exit $LASTEXITCODE }
          python -m pip install -e '.[test]' *>> $installLog
          if ($LASTEXITCODE -ne 0) { Get-Content $installLog; exit $LASTEXITCODE }
          & .\tools\install_pinned_asmpython.ps1 -LogPath $installLog
      - name: Capture compiler diagnostic
        id: build
        shell: powershell
        run: |
          $buildLog = Join-Path $env:RUNNER_TEMP 'portapy-build-windows.log'
          $reportLog = Join-Path $env:RUNNER_TEMP 'portapy-report-windows.log'
          $output = Join-Path $env:RUNNER_TEMP 'portapy.dll'
          $workDir = Join-Path $env:RUNNER_TEMP 'portapy-build-windows'
          python tools/build_native_typed.py `
            --target windows `
            --output $output `
            --work-dir $workDir `
            *> $buildLog
          $status = $LASTEXITCODE
          $lines = Get-Content $buildLog
          $errorLines = $lines | Select-String -Pattern 'error|failed|failure|unsupported|traceback|exception|undefined|invalid'
          @(
            '=== FIRST 35 LINES ==='
            $lines | Select-Object -First 35
            ''
            '=== ERROR-LIKE LINES ==='
            $errorLines | Select-Object -Last 120
            ''
            '=== FINAL 120 LINES ==='
            $lines | Select-Object -Last 120
          ) | Set-Content -Encoding utf8 $reportLog
          "status=$status" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          'report<<PORTAPY_BUILD_REPORT' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Get-Content $reportLog | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          'PORTAPY_BUILD_REPORT' | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          exit 0
      - name: Upload Windows compiler diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-build-diagnostic-windows
          path: |
            ${{ runner.temp }}/portapy-install-windows.log
            ${{ runner.temp }}/portapy-build-windows.log
            ${{ runner.temp }}/portapy-report-windows.log
            ${{ runner.temp }}/portapy-build-windows
            ${{ runner.temp }}/portapy.dll
            ${{ runner.temp }}/portapy.dll.json

  report-windows:
    needs: build-windows
    runs-on: windows-2022
    steps:
      - name: Report compiler diagnostic
        env:
          BUILD_REPORT: ${{ needs.build-windows.outputs.report }}
          BUILD_STATUS: ${{ needs.build-windows.outputs.status }}
        shell: powershell
        run: |
          Write-Host $env:BUILD_REPORT
          exit [int]$env:BUILD_STATUS
