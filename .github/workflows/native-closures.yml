name: Native lexical closures

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package, toolchain, and asmpython
        run: |
          sudo apt-get update
          sudo apt-get install --yes nasm gcc binutils
          python -m pip install --no-cache-dir --force-reinstall \
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
          python -m pip install -e '.[test]'
      - name: Test closure cell semantics
        run: python -m pytest tests/test_rewrite_generated_closures.py
      - name: Build native library
        run: |
          python tools/build_native_host_calls.py \
            --target linux \
            --output dist/libportapy.so \
            --work-dir dist/build-closures-linux
      - name: Exercise returned lexical closures
        run: |
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_closure_host.c -ldl -o dist/native_closure_host
          ./dist/native_closure_host ./dist/libportapy.so \
            | tee dist/closure-output.txt
          grep -qx 'native-closures: ok' dist/closure-output.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: native-closures-linux
          path: dist

  windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package, toolchain, and asmpython
        shell: powershell
        run: |
          choco install nasm mingw -y --no-progress
          python -m pip install --no-cache-dir --force-reinstall `
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
          python -m pip install -e '.[test]'
      - name: Test closure cell semantics
        shell: powershell
        run: python -m pytest tests/test_rewrite_generated_closures.py
      - name: Build native library
        shell: powershell
        run: |
          python tools/build_native_host_calls.py `
            --target windows `
            --output dist/portapy.dll `
            --work-dir dist/build-closures-windows
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Exercise returned lexical closures
        shell: powershell
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude `
            tests/native_closure_host.c -o dist/native_closure_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output = @(& dist/native_closure_host.exe dist/portapy.dll)
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output | Out-File -Encoding utf8 dist/closure-output.txt
          if ($output[-1] -ne 'native-closures: ok') {
            throw "unexpected closure output: $($output -join [Environment]::NewLine)"
          }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: native-closures-windows
          path: dist
