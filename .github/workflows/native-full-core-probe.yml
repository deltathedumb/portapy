name: Native full-core probe

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: native-full-core-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install native toolchain and verified asmpython
        run: |
          sudo apt-get update
          sudo apt-get install --yes nasm gcc binutils
          python -m pip install --no-cache-dir --force-reinstall \
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
      - name: Normalize probe source
        shell: bash
        run: |
          mkdir -p dist
          set +e
          python -m tools.normalize_full_core_validation \
            > dist/linux-full-core-normalization.txt 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            if [ -f dist/full-core-normalization-error.txt ]; then
              cat dist/full-core-normalization-error.txt
            else
              cat dist/linux-full-core-normalization.txt
            fi
            exit "$status"
          fi
          cat dist/linux-full-core-normalization.txt
          mkdir -p dist/debug-tree
          python - <<'PY'
          from pathlib import Path
          import shutil
          import asmpython

          root = Path('dist/debug-tree')
          shutil.copytree(Path(asmpython.__file__).resolve().parent, root / 'asmpython')
          shutil.copytree(Path('src').resolve(), root / 'src')
          shutil.copy2('tools/run_full_core_asmpython.py', root / 'run_full_core_asmpython.py')
          PY
      - name: Compile full frontend and VM probe
        shell: bash
        run: |
          mkdir -p dist
          set +e
          set -o pipefail
          python tools/run_full_core_asmpython.py build src/portapy/native_full_core_probe.py \
            --target linux --type library --backend legacy \
            --no-pyinbin-fallback --keep-assembly \
            -o dist/libportapy_full_core_probe.so \
            2>&1 | tee dist/linux-full-core-build.log
          compiler_status=${PIPESTATUS[0]}
          set -e
          if [ ! -f dist/libportapy_full_core_probe.asm ]; then
            exit "$compiler_status"
          fi
          python tools/nasm_module_init.py dist/libportapy_full_core_probe.asm \
            --target linux --public-symbol portapy_library_initialize
          python tools/nasm_exports.py dist/libportapy_full_core_probe.asm \
            --export portapy_library_initialize \
            --export portapy_abi_version \
            --export portapy_full_core_parse_probe \
            --export portapy_full_core_probe
          python tools/elf_pic.py dist/libportapy_full_core_probe.asm
          python tools/elf_relocatable_constants.py dist/libportapy_full_core_probe.asm
          python tools/elf_runtime_abi.py dist/libportapy_full_core_probe.asm
          nasm -f elf64 -w-label-redef-late \
            dist/libportapy_full_core_probe.asm \
            -o dist/libportapy_full_core_probe.o
          cat > dist/portapy_full_core_probe.map <<'MAP'
          {
            global:
              portapy_library_initialize;
              portapy_abi_version;
              portapy_full_core_parse_probe;
              portapy_full_core_probe;
            local: *;
          };
          MAP
          gcc -shared dist/libportapy_full_core_probe.o \
            -Wl,--version-script=dist/portapy_full_core_probe.map \
            -o dist/libportapy_full_core_probe.so
      - name: Execute full core from external C host
        run: |
          if readelf -dW dist/libportapy_full_core_probe.so | grep -q TEXTREL; then
            echo 'text relocations are forbidden'
            exit 1
          fi
          cc -std=c11 -Wall -Wextra -Werror \
            tests/native_full_core_probe_host.c -ldl \
            -o dist/native_full_core_probe_host
          ./dist/native_full_core_probe_host \
            ./dist/libportapy_full_core_probe.so \
            | tee dist/linux-full-core-output.txt
          grep -qx 'full-core=42' dist/linux-full-core-output.txt
      - name: Build production full Runtime library
        run: |
          python tools/build_native_full_runtime.py \
            --target linux \
            --already-normalized \
            --output dist/libportapy.so \
            --work-dir dist/build-full-runtime-linux
      - name: Execute production universal ABI
        run: |
          if readelf -dW dist/libportapy.so | grep -q TEXTREL; then
            echo 'production text relocations are forbidden'
            exit 1
          fi
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_environment_api_host.c -ldl \
            -o dist/native_environment_api_host
          ./dist/native_environment_api_host ./dist/libportapy.so \
            | tee dist/linux-full-runtime-output.txt
          grep -qx 'Hello, world!' dist/linux-full-runtime-output.txt
          tail -n 1 dist/linux-full-runtime-output.txt \
            | grep -qx 'universal-environment-api: ok'
      - name: Report Linux full-core failure
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '<!-- portapy-full-core-linux-diagnostic -->'
            echo '### Linux full-core diagnostic'
            echo
            echo '```text'
            if [ -f dist/full-core-normalization-error.txt ]; then
              cat dist/full-core-normalization-error.txt
            elif [ -f dist/linux-full-core-build.log ]; then
              tail -n 180 dist/linux-full-core-build.log
            elif [ -f dist/linux-full-core-normalization.txt ]; then
              cat dist/linux-full-core-normalization.txt
            else
              echo 'No diagnostic log was produced.'
            fi
            echo '```'
          } > /tmp/portapy-full-core-linux.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file /tmp/portapy-full-core-linux.md
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-full-core-probe
          path: dist

  windows:
    runs-on: windows-2025
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install native toolchain and verified asmpython
        shell: powershell
        run: |
          choco install nasm mingw -y --no-progress
          python -m pip install --no-cache-dir --force-reinstall `
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
      - name: Normalize probe source
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $normalizationLog = Join-Path $PWD 'dist/windows-full-core-normalization.txt'
          python -m tools.normalize_full_core_validation *> $normalizationLog
          $status = $LASTEXITCODE
          if ($status -ne 0) {
            if (Test-Path dist/full-core-normalization-error.txt) {
              Get-Content dist/full-core-normalization-error.txt
            } else {
              Get-Content $normalizationLog
            }
            exit $status
          }
          Get-Content $normalizationLog
      - name: Compile full frontend and VM probe
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          python tools/run_full_core_asmpython.py build src/portapy/native_full_core_probe.py `
            --target windows --type library --backend legacy `
            --no-pyinbin-fallback --keep-assembly `
            -o dist/portapy_full_core_probe.dll `
            *>&1 | Tee-Object -FilePath dist/windows-full-core-build.log
          $compilerExit = $LASTEXITCODE
          if (-not (Test-Path dist/portapy_full_core_probe.asm)) {
            exit $compilerExit
          }
          python tools/nasm_module_init.py dist/portapy_full_core_probe.asm `
            --target windows --public-symbol portapy_library_initialize
          python tools/nasm_exports.py dist/portapy_full_core_probe.asm `
            --export portapy_library_initialize `
            --export portapy_abi_version `
            --export portapy_full_core_parse_probe `
            --export portapy_full_core_probe
          nasm -f win64 -w-label-redef-late `
            dist/portapy_full_core_probe.asm `
            -o dist/portapy_full_core_probe.obj
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          @'
          LIBRARY portapy_full_core_probe
          EXPORTS
              portapy_library_initialize
              portapy_abi_version
              portapy_full_core_parse_probe
              portapy_full_core_probe
          '@ | Set-Content -Encoding ascii dist/portapy_full_core_probe.def
          gcc -shared dist/portapy_full_core_probe.obj `
            dist/portapy_full_core_probe.def `
            -o dist/portapy_full_core_probe.dll
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Execute full core from external C host
        shell: powershell
        run: |
          gcc -std=c11 -Wall -Wextra -Werror `
            tests/native_full_core_probe_host.c `
            -o dist/native_full_core_probe_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output = & dist/native_full_core_probe_host.exe `
            dist/portapy_full_core_probe.dll
          $output | Out-File -Encoding utf8 dist/windows-full-core-output.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($output -ne 'full-core=42') { throw "unexpected full-core output: $output" }
      - name: Build production full Runtime library
        shell: powershell
        run: |
          python tools/build_native_full_runtime.py `
            --target windows `
            --already-normalized `
            --output dist/portapy.dll `
            --work-dir dist/build-full-runtime-windows
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Execute production universal ABI
        shell: powershell
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude `
            tests/native_environment_api_host.c `
            -o dist/native_environment_api_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output = @(& dist/native_environment_api_host.exe dist/portapy.dll)
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output | Out-File -Encoding utf8 dist/windows-full-runtime-output.txt
          if ($output[0] -ne 'Hello, world!') {
            throw "unexpected callback output: $($output -join [Environment]::NewLine)"
          }
          if ($output[-1] -ne 'universal-environment-api: ok') {
            throw "unexpected final output: $($output -join [Environment]::NewLine)"
          }
      - name: Report Windows full-core failure
        if: failure() && github.event_name == 'pull_request'
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $lines = @(
            '<!-- portapy-full-core-windows-diagnostic -->',
            '### Windows full-core diagnostic',
            '',
            '```text'
          )
          if (Test-Path dist/full-core-normalization-error.txt) {
            $lines += Get-Content dist/full-core-normalization-error.txt
          } elseif (Test-Path dist/windows-full-core-build.log) {
            $lines += Get-Content dist/windows-full-core-build.log | Select-Object -Last 180
          } elseif (Test-Path dist/windows-full-core-normalization.txt) {
            $lines += Get-Content dist/windows-full-core-normalization.txt
          } else {
            $lines += 'No diagnostic log was produced.'
          }
          $lines += '```'
          $lines | Set-Content -Encoding utf8 $env:TEMP/portapy-full-core-windows.md
          gh pr comment "${{ github.event.pull_request.number }}" `
            --body-file $env:TEMP/portapy-full-core-windows.md
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-full-core-probe
          path: dist
