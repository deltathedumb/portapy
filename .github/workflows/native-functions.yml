name: Native function probe

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install native toolchain and asmpython
        run: |
          sudo apt-get update
          sudo apt-get install --yes nasm gcc binutils
          python -m pip install --no-cache-dir --force-reinstall \
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
      - name: Compile generated native function entry
        run: |
          python tools/build_native_functions.py \
            --target linux \
            --output dist/libportapy-functions.so \
            --work-dir dist/build-functions-linux
      - name: Execute function entry from C
        run: |
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_function_host.c -ldl -o dist/native_function_host
          ./dist/native_function_host ./dist/libportapy-functions.so \
            | tee dist/native-function-output.txt
          grep -qx 'native-functions: ok' dist/native-function-output.txt
      - name: Execute positional variadics from C
        run: |
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_varargs_host.c -ldl -o dist/native_varargs_host
          ./dist/native_varargs_host ./dist/libportapy-functions.so \
            | tee dist/native-varargs-output.txt
          grep -qx 'native-varargs: ok' dist/native-varargs-output.txt
      - name: Execute keyword variadics from C
        run: |
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_kwargs_host.c -ldl -o dist/native_kwargs_host
          ./dist/native_kwargs_host ./dist/libportapy-functions.so \
            | tee dist/native-kwargs-output.txt
          grep -qx 'native-kwargs: ok' dist/native-kwargs-output.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-native-functions
          path: dist

  windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install native toolchain and asmpython
        shell: powershell
        run: |
          choco install nasm mingw -y --no-progress
          python -m pip install --no-cache-dir --force-reinstall `
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
      - name: Compile generated native function entry
        shell: powershell
        run: |
          python tools/build_native_functions.py `
            --target windows `
            --output dist/portapy-functions.dll `
            --work-dir dist/build-functions-windows
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Execute function entry from C
        shell: powershell
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude `
            tests/native_function_host.c -o dist/native_function_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output = & dist/native_function_host.exe dist/portapy-functions.dll
          $output | Out-File -Encoding utf8 dist/native-function-output.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($output -ne 'native-functions: ok') {
            throw "unexpected native function output: $output"
          }
      - name: Execute positional variadics from C
        shell: powershell
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude `
            tests/native_varargs_host.c -o dist/native_varargs_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output = & dist/native_varargs_host.exe dist/portapy-functions.dll
          $output | Out-File -Encoding utf8 dist/native-varargs-output.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($output -ne 'native-varargs: ok') {
            throw "unexpected native varargs output: $output"
          }
      - name: Execute keyword variadics from C
        shell: powershell
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude `
            tests/native_kwargs_host.c -o dist/native_kwargs_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output = & dist/native_kwargs_host.exe dist/portapy-functions.dll
          $output | Out-File -Encoding utf8 dist/native-kwargs-output.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($output -ne 'native-kwargs: ok') {
            throw "unexpected native kwargs output: $output"
          }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-native-functions
          path: dist
