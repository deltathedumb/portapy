name: Native opaque-handle ABI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install native toolchain and asmpython
        run: |
          sudo apt-get update
          sudo apt-get install --yes nasm gcc binutils
          python -m pip install --no-cache-dir --force-reinstall \
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
      - name: Build genuine Python-authored library
        run: |
          python tools/build_native_typed.py \
            --target linux \
            --output dist/libportapy.so \
            --work-dir dist/build-linux
      - name: Report Linux build failure
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '<!-- portapy-native-linux-diagnostic -->'
            echo '### Linux native build diagnostic'
            echo
            echo '```text'
            find dist -maxdepth 3 -type f -print 2>/dev/null || true
            echo
            for file in \
              dist/build-linux/linux-asmpython-build.log \
              dist/build-linux/linux-nasm.log \
              dist/build-linux/linux-glue.log \
              dist/build-linux/linux-link.log; do
              if [ -f "$file" ]; then
                echo "===== $file ====="
                tail -n 120 "$file"
              fi
            done
            echo '```'
          } > /tmp/portapy-linux-diagnostic.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file /tmp/portapy-linux-diagnostic.md
      - name: Verify exports and execute external hosts
        run: |
          if readelf -dW dist/libportapy.so | grep -q TEXTREL; then
            echo 'text relocations are forbidden'
            exit 1
          fi
          nm -D --defined-only dist/libportapy.so | tee dist/linux-exports.txt
          awk '{print $3}' dist/linux-exports.txt | grep '^portapy_' | sort > dist/actual-symbols.txt
          python - <<'PY'
          from pathlib import Path
          from tools.native_surface import PUBLIC_EXPORTS
          Path('dist/expected-symbols.txt').write_text(
              '\n'.join(sorted(PUBLIC_EXPORTS)) + '\n',
              encoding='utf-8',
          )
          PY
          diff -u dist/expected-symbols.txt dist/actual-symbols.txt
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_handle_host.c -ldl -o dist/native_handle_host
          ./dist/native_handle_host ./dist/libportapy.so | tee dist/host-output.txt
          grep -qx 'opaque-floats: ok' dist/host-output.txt
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_statement_host.c -ldl -o dist/native_statement_host
          ./dist/native_statement_host ./dist/libportapy.so | tee dist/statement-output.txt
          grep -qx 'statement-blocks: ok' dist/statement-output.txt
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_text_error_host.c -ldl -o dist/native_text_error_host
          ./dist/native_text_error_host ./dist/libportapy.so | tee dist/text-error-output.txt
          grep -qx 'native-text-errors: ok' dist/text-error-output.txt
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_typed_literal_host.c -ldl -o dist/native_typed_literal_host
          ./dist/native_typed_literal_host ./dist/libportapy.so | tee dist/typed-literal-output.txt
          grep -qx 'typed-literals: ok' dist/typed-literal-output.txt
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_boolean_expression_host.c -ldl -o dist/native_boolean_expression_host
          ./dist/native_boolean_expression_host ./dist/libportapy.so | tee dist/boolean-expression-output.txt
          grep -qx 'boolean-expressions: ok' dist/boolean-expression-output.txt
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_expression_host.c -ldl -o dist/native_expression_host
          ./dist/native_expression_host ./dist/libportapy.so | tee dist/expression-output.txt
          grep -qx 'general-expressions: ok' dist/expression-output.txt
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_control_flow_host.c -ldl -o dist/native_control_flow_host
          ./dist/native_control_flow_host ./dist/libportapy.so | tee dist/control-flow-output.txt
          grep -qx 'control-flow: ok' dist/control-flow-output.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-native
          path: dist

  windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install native toolchain and asmpython
        shell: powershell
        run: |
          choco install nasm mingw -y --no-progress
          python -m pip install --no-cache-dir --force-reinstall `
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
      - name: Build genuine Python-authored library
        shell: powershell
        run: |
          python tools/build_native_typed.py `
            --target windows `
            --output dist/portapy.dll `
            --work-dir dist/build-windows
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Report Windows build failure
        if: failure() && github.event_name == 'pull_request'
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $lines = @(
            '<!-- portapy-native-windows-diagnostic -->',
            '### Windows native build diagnostic',
            '',
            '```text'
          )
          Get-ChildItem -Path dist -File -Recurse -ErrorAction SilentlyContinue |
            ForEach-Object { $lines += $_.FullName }
          foreach ($file in @(
            'dist/build-windows/windows-asmpython-build.log',
            'dist/build-windows/windows-nasm.log',
            'dist/build-windows/windows-glue.log',
            'dist/build-windows/windows-link.log'
          )) {
            if (Test-Path $file) {
              $lines += "===== $file ====="
              $lines += Get-Content $file -Tail 120
            }
          }
          $lines += '```'
          $lines | Set-Content -Encoding utf8 $env:RUNNER_TEMP\portapy-windows-diagnostic.md
          gh pr comment "${{ github.event.pull_request.number }}" `
            --body-file $env:RUNNER_TEMP\portapy-windows-diagnostic.md
      - name: Verify exports and execute external hosts
        shell: powershell
        run: |
          objdump -p dist/portapy.dll | Out-File -Encoding utf8 dist/windows-exports.txt
          $symbols = python -c "from tools.native_surface import PUBLIC_EXPORTS; print(' '.join(PUBLIC_EXPORTS))"
          foreach ($symbol in $symbols.Split(' ', [System.StringSplitOptions]::RemoveEmptyEntries)) {
            if (-not (Select-String -Path dist/windows-exports.txt -Pattern "\b$symbol\b" -Quiet)) {
              throw "missing export: $symbol"
            }
          }
          if (Select-String -Path dist/windows-exports.txt -Pattern 'portapy_internal_' -Quiet) {
            throw 'internal Python symbols must not be exported'
          }
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude `
            tests/native_handle_host.c -o dist/native_handle_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output = & dist/native_handle_host.exe dist/portapy.dll
          $output | Out-File -Encoding utf8 dist/host-output.txt
          if ($output -ne 'opaque-floats: ok') { throw "unexpected host output: $output" }
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude `
            tests/native_statement_host.c -o dist/native_statement_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $statementOutput = & dist/native_statement_host.exe dist/portapy.dll
          $statementOutput | Out-File -Encoding utf8 dist/statement-output.txt
          if ($statementOutput -ne 'statement-blocks: ok') { throw "unexpected statement output: $statementOutput" }
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude `
            tests/native_text_error_host.c -o dist/native_text_error_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $textErrorOutput = & dist/native_text_error_host.exe dist/portapy.dll
          $textErrorOutput | Out-File -Encoding utf8 dist/text-error-output.txt
          if ($textErrorOutput -ne 'native-text-errors: ok') { throw "unexpected text/error output: $textErrorOutput" }
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude `
            tests/native_typed_literal_host.c -o dist/native_typed_literal_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $typedLiteralOutput = & dist/native_typed_literal_host.exe dist/portapy.dll
          $typedLiteralOutput | Out-File -Encoding utf8 dist/typed-literal-output.txt
          if ($typedLiteralOutput -ne 'typed-literals: ok') { throw "unexpected typed literal output: $typedLiteralOutput" }
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude `
            tests/native_boolean_expression_host.c -o dist/native_boolean_expression_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $booleanExpressionOutput = & dist/native_boolean_expression_host.exe dist/portapy.dll
          $booleanExpressionOutput | Out-File -Encoding utf8 dist/boolean-expression-output.txt
          if ($booleanExpressionOutput -ne 'boolean-expressions: ok') { throw "unexpected boolean expression output: $booleanExpressionOutput" }
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude `
            tests/native_expression_host.c -o dist/native_expression_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $expressionOutput = & dist/native_expression_host.exe dist/portapy.dll
          $expressionOutput | Out-File -Encoding utf8 dist/expression-output.txt
          if ($expressionOutput -ne 'general-expressions: ok') { throw "unexpected expression output: $expressionOutput" }
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude `
            tests/native_control_flow_host.c -o dist/native_control_flow_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $controlFlowOutput = & dist/native_control_flow_host.exe dist/portapy.dll
          $controlFlowOutput | Out-File -Encoding utf8 dist/control-flow-output.txt
          if ($controlFlowOutput -ne 'control-flow: ok') { throw "unexpected control-flow output: $controlFlowOutput" }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-native
          path: dist
