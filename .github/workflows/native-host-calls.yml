name: Native host call probe

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install native toolchain and asmpython
        run: |
          sudo apt-get update
          sudo apt-get install --yes nasm gcc binutils
          python -m pip install --no-cache-dir --force-reinstall \
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
      - name: Build host-call library
        run: |
          python tools/build_native_host_calls.py \
            --target linux \
            --output dist/libportapy.so \
            --work-dir dist/build-linux
      - name: Execute host calls from C
        run: |
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_host_call_host.c -ldl -o dist/native_host_call_host
          ./dist/native_host_call_host ./dist/libportapy.so | tee dist/host-call-output.txt
          grep -qx 'native-host-calls: ok' dist/host-call-output.txt
      - name: Execute managed environment ABI from C
        run: |
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_managed_environment_host.c -ldl \
            -o dist/native_managed_environment_host
          ./dist/native_managed_environment_host ./dist/libportapy.so \
            | tee dist/managed-environment-output.txt
          grep -qx 'managed-environment: ok' dist/managed-environment-output.txt
      - name: Execute public tuple ABI from C
        run: |
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_tuple_host.c -ldl -o dist/native_tuple_host
          ./dist/native_tuple_host ./dist/libportapy.so | tee dist/tuple-output.txt
          grep -qx 'native-tuples: ok' dist/tuple-output.txt
      - name: Execute public dictionary ABI from C
        run: |
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_dict_host.c -ldl -o dist/native_dict_host
          ./dist/native_dict_host ./dist/libportapy.so | tee dist/dict-output.txt
          grep -qx 'native-dicts: ok' dist/dict-output.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-native-host-calls
          path: dist

  windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install native toolchain and asmpython
        shell: powershell
        run: |
          choco install nasm mingw -y --no-progress
          python -m pip install --no-cache-dir --force-reinstall `
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
      - name: Build host-call library
        shell: powershell
        run: |
          python tools/build_native_host_calls.py `
            --target windows `
            --output dist/portapy.dll `
            --work-dir dist/build-windows
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Execute host calls from C
        shell: powershell
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude `
            tests/native_host_call_host.c -o dist/native_host_call_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output = & dist/native_host_call_host.exe dist/portapy.dll
          $output | Out-File -Encoding utf8 dist/host-call-output.txt
          if ($output -ne 'native-host-calls: ok') { throw "unexpected host-call output: $output" }
      - name: Execute managed environment ABI from C
        shell: powershell
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude `
            tests/native_managed_environment_host.c `
            -o dist/native_managed_environment_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output = & dist/native_managed_environment_host.exe dist/portapy.dll
          $output | Out-File -Encoding utf8 dist/managed-environment-output.txt
          if ($output -ne 'managed-environment: ok') { throw "unexpected managed environment output: $output" }
      - name: Execute direct C# environment API
        shell: powershell
        run: |
          $project = 'tests/csharp/PortaPy.ManagedSmoke/PortaPy.ManagedSmoke.csproj'
          dotnet build $project -c Release *>&1 `
            | Tee-Object -FilePath dist/csharp-managed-build.log
          $buildExit = $LASTEXITCODE
          if ($buildExit -ne 0) { exit $buildExit }
          $outputDirectory = 'tests/csharp/PortaPy.ManagedSmoke/bin/Release/net8.0'
          Copy-Item dist/portapy.dll "$outputDirectory/portapy.dll"
          & dotnet "$outputDirectory/PortaPy.ManagedSmoke.dll" *>&1 `
            | Tee-Object -FilePath dist/csharp-managed-run.log
          $runExit = $LASTEXITCODE
          if ($runExit -ne 0) { exit $runExit }
          $output = Get-Content dist/csharp-managed-run.log
          $output | Out-File -Encoding utf8 dist/csharp-managed-environment-output.txt
          if ($output[-1] -ne 'csharp-managed-environment: ok') { throw "unexpected C# output: $output" }
      - name: Execute public tuple ABI from C
        shell: powershell
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude `
            tests/native_tuple_host.c -o dist/native_tuple_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output = & dist/native_tuple_host.exe dist/portapy.dll
          $output | Out-File -Encoding utf8 dist/tuple-output.txt
          if ($output -ne 'native-tuples: ok') { throw "unexpected tuple output: $output" }
      - name: Execute public dictionary ABI from C
        shell: powershell
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude `
            tests/native_dict_host.c -o dist/native_dict_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output = & dist/native_dict_host.exe dist/portapy.dll
          $output | Out-File -Encoding utf8 dist/dict-output.txt
          if ($output -ne 'native-dicts: ok') { throw "unexpected dictionary output: $output" }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-native-host-calls
          path: dist
