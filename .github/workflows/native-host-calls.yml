name: Native host call and full environment probe

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install native toolchain and asmpython
        run: |
          sudo apt-get update
          sudo apt-get install --yes nasm gcc binutils
          python -m pip install --no-cache-dir --force-reinstall \
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
      - name: Normalize standalone VM implementation for the pinned compiler
        run: |
          cp src/portapy/core/bootstrap_frontend.py src/portapy/core/frontend.py
          cp src/portapy/core/vm_impl.py src/portapy/core/vm.py
          python tools/normalize_full_core_lambdas.py
          python tools/normalize_full_core_native_semantics.py
          python tools/normalize_full_core_opcode_maps.py
          python tools/normalize_full_core_validation.py
          cp src/portapy/core/vm.py src/portapy/core/vm_impl.py
          git checkout -- src/portapy/core/frontend.py src/portapy/core/vm.py
      - name: Audit generated standalone entry
        run: |
          mkdir -p dist
          python tools/audit_standalone_generated_entry.py \
            --target linux \
            --output dist/generated-standalone-linux.py
      - name: Build host-call library over standalone VM
        run: |
          python tools/build_native_host_calls.py \
            --standalone-vm \
            --target linux \
            --output dist/libportapy.so \
            --work-dir dist/build-linux
          if readelf -dW dist/libportapy.so | grep -q TEXTREL; then
            echo 'text relocations are forbidden'
            exit 1
          fi
      - name: Prove Linux artifact has no Python runtime dependency
        run: |
          readelf -dW dist/libportapy.so | tee dist/linux-dynamic-section.txt
          ldd dist/libportapy.so | tee dist/linux-dependencies.txt
          if grep -Eiq 'NEEDED.*(lib)?python|(^|[[:space:]/])libpython[0-9]' \
              dist/linux-dynamic-section.txt dist/linux-dependencies.txt; then
            echo 'standalone library must not load or link libpython'
            exit 1
          fi
      - name: Execute host calls from C
        run: |
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_host_call_host.c -ldl -o dist/native_host_call_host
          ./dist/native_host_call_host ./dist/libportapy.so | tee dist/host-call-output.txt
          grep -qx 'native-host-calls: ok' dist/host-call-output.txt
      - name: Execute full high-level environment from C
        run: |
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_full_environment_host.c -ldl \
            -o dist/native_full_environment_host
          ./dist/native_full_environment_host ./dist/libportapy.so \
            | tee dist/full-environment-output.txt
          grep -qx 'native-full-environment: ok' dist/full-environment-output.txt
      - name: Execute public container ABI from C
        run: |
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_tuple_host.c -ldl -o dist/native_tuple_host
          ./dist/native_tuple_host ./dist/libportapy.so | tee dist/tuple-output.txt
          grep -qx 'native-tuples: ok' dist/tuple-output.txt
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_dict_host.c -ldl -o dist/native_dict_host
          ./dist/native_dict_host ./dist/libportapy.so | tee dist/dict-output.txt
          grep -qx 'native-dicts: ok' dist/dict-output.txt
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_list_host.c -ldl -o dist/native_list_host
          ./dist/native_list_host ./dist/libportapy.so | tee dist/list-output.txt
          grep -qx 'native-lists: ok' dist/list-output.txt
      - name: Execute remaining standalone release matrix from C
        run: |
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_handle_host.c -ldl -o dist/native_handle_host
          ./dist/native_handle_host ./dist/libportapy.so | tee dist/handle-output.txt
          grep -qx 'opaque-floats: ok' dist/handle-output.txt
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_import_host.c -ldl -o dist/native_import_host
          ./dist/native_import_host ./dist/libportapy.so | tee dist/import-output.txt
          grep -qx 'native-host-imports: ok' dist/import-output.txt
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_traceback_host.c -ldl -o dist/native_traceback_host
          ./dist/native_traceback_host ./dist/libportapy.so | tee dist/traceback-output.txt
          grep -qx 'native-traceback-frames: ok' dist/traceback-output.txt
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_full_runtime_host.c -ldl -o dist/native_full_runtime_host
          ./dist/native_full_runtime_host ./dist/libportapy.so | tee dist/full-runtime-output.txt
          grep -qx 'native-full-runtime: ok' dist/full-runtime-output.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-native-host-calls
          path: dist

  windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install native toolchain and asmpython
        shell: powershell
        run: |
          choco install nasm mingw -y --no-progress
          python -m pip install --no-cache-dir --force-reinstall `
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
      - name: Normalize standalone VM implementation for the pinned compiler
        shell: powershell
        run: |
          Copy-Item src/portapy/core/bootstrap_frontend.py src/portapy/core/frontend.py -Force
          Copy-Item src/portapy/core/vm_impl.py src/portapy/core/vm.py -Force
          python tools/normalize_full_core_lambdas.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/normalize_full_core_native_semantics.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/normalize_full_core_opcode_maps.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tools/normalize_full_core_validation.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Copy-Item src/portapy/core/vm.py src/portapy/core/vm_impl.py -Force
          git checkout -- src/portapy/core/frontend.py src/portapy/core/vm.py
      - name: Audit generated standalone entry
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          python tools/audit_standalone_generated_entry.py `
            --target windows `
            --output dist/generated-standalone-windows.py
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Build host-call library over standalone VM
        shell: powershell
        run: |
          python tools/build_native_host_calls.py `
            --standalone-vm `
            --target windows `
            --output dist/portapy.dll `
            --work-dir dist/build-windows
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Prove Windows artifact has no Python runtime dependency
        shell: powershell
        run: |
          $imports = & objdump -p dist/portapy.dll
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $imports | Out-File -Encoding utf8 dist/windows-imports.txt
          if ($imports -match 'DLL Name:\s*(python|libpython)[^\s]*\.dll') {
            throw 'standalone library must not load or link a Python DLL'
          }
      - name: Execute host calls from C
        shell: powershell
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude `
            tests/native_host_call_host.c -o dist/native_host_call_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output = & dist/native_host_call_host.exe dist/portapy.dll
          $output | Out-File -Encoding utf8 dist/host-call-output.txt
          if ($output -ne 'native-host-calls: ok') { throw "unexpected host-call output: $output" }
      - name: Execute full high-level environment from C
        shell: powershell
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude `
            tests/native_full_environment_host.c `
            -o dist/native_full_environment_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output = & dist/native_full_environment_host.exe dist/portapy.dll
          $output | Out-File -Encoding utf8 dist/full-environment-output.txt
          if ($output -ne 'native-full-environment: ok') {
            throw "unexpected full environment output: $output"
          }
      - name: Execute public container ABI from C
        shell: powershell
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude tests/native_tuple_host.c -o dist/native_tuple_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $tupleOutput = & dist/native_tuple_host.exe dist/portapy.dll
          $tupleOutput | Out-File -Encoding utf8 dist/tuple-output.txt
          if ($tupleOutput -ne 'native-tuples: ok') { throw "unexpected tuple output: $tupleOutput" }
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude tests/native_dict_host.c -o dist/native_dict_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $dictOutput = & dist/native_dict_host.exe dist/portapy.dll
          $dictOutput | Out-File -Encoding utf8 dist/dict-output.txt
          if ($dictOutput -ne 'native-dicts: ok') { throw "unexpected dictionary output: $dictOutput" }
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude tests/native_list_host.c -o dist/native_list_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $listOutput = & dist/native_list_host.exe dist/portapy.dll
          $listOutput | Out-File -Encoding utf8 dist/list-output.txt
          if ($listOutput -ne 'native-lists: ok') { throw "unexpected list output: $listOutput" }
      - name: Execute remaining standalone release matrix from C
        shell: powershell
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude tests/native_handle_host.c -o dist/native_handle_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $handleOutput = & dist/native_handle_host.exe dist/portapy.dll
          $handleOutput | Out-File -Encoding utf8 dist/handle-output.txt
          if ($handleOutput -ne 'opaque-floats: ok') { throw "unexpected handle output: $handleOutput" }
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude tests/native_import_host.c -o dist/native_import_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $importOutput = & dist/native_import_host.exe dist/portapy.dll
          $importOutput | Out-File -Encoding utf8 dist/import-output.txt
          if ($importOutput -ne 'native-host-imports: ok') { throw "unexpected import output: $importOutput" }
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude tests/native_traceback_host.c -o dist/native_traceback_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $tracebackOutput = & dist/native_traceback_host.exe dist/portapy.dll
          $tracebackOutput | Out-File -Encoding utf8 dist/traceback-output.txt
          if ($tracebackOutput -ne 'native-traceback-frames: ok') { throw "unexpected traceback output: $tracebackOutput" }
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude tests/native_full_runtime_host.c -o dist/native_full_runtime_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $runtimeOutput = & dist/native_full_runtime_host.exe dist/portapy.dll
          $runtimeOutput | Out-File -Encoding utf8 dist/full-runtime-output.txt
          if ($runtimeOutput -ne 'native-full-runtime: ok') { throw "unexpected full-runtime output: $runtimeOutput" }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-native-host-calls
          path: dist
