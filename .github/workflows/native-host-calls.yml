name: Native host call and full environment probe

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install native toolchain and asmpython
        run: |
          sudo apt-get update
          sudo apt-get install --yes nasm gcc binutils
          python -m pip install --no-cache-dir --force-reinstall \
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
      - name: Prepare standalone VM implementation
        run: |
          mkdir -p dist
          set -o pipefail
          python tools/prepare_standalone_native_sources.py 2>&1 | tee dist/prepare.log
      - name: Audit generated standalone entry
        run: |
          set -o pipefail
          python tools/audit_standalone_generated_entry.py \
            --target linux \
            --output dist/generated-standalone-linux.py \
            2>&1 | tee dist/audit.log
      - name: Build host-call library over standalone VM
        run: |
          set -o pipefail
          python tools/build_native_host_calls.py \
            --standalone-vm \
            --target linux \
            --output dist/libportapy.so \
            --work-dir dist/build-linux \
            2>&1 | tee dist/build.log
          if readelf -dW dist/libportapy.so | grep -q TEXTREL; then
            echo 'text relocations are forbidden'
            exit 1
          fi
      - name: Prove Linux artifact has no Python runtime dependency
        run: |
          readelf -dW dist/libportapy.so | tee dist/linux-dynamic-section.txt
          ldd dist/libportapy.so | tee dist/linux-dependencies.txt
          if grep -Eiq 'NEEDED.*(lib)?python|(^|[[:space:]/])libpython[0-9]' \
              dist/linux-dynamic-section.txt dist/linux-dependencies.txt; then
            echo 'standalone library must not load or link libpython'
            exit 1
          fi
      - name: Execute complete Linux release matrix
        run: |
          run_host() {
            source="$1"
            binary="$2"
            expected="$3"
            cc -std=c11 -Wall -Wextra -Werror -Iinclude "$source" -ldl -o "dist/$binary"
            "./dist/$binary" ./dist/libportapy.so | tee "dist/$binary-output.txt"
            grep -qx "$expected" "dist/$binary-output.txt"
          }
          run_host tests/native_host_call_host.c native_host_call_host 'native-host-calls: ok'
          run_host tests/native_full_environment_host.c native_full_environment_host 'native-full-environment: ok'
          run_host tests/native_tuple_host.c native_tuple_host 'native-tuples: ok'
          run_host tests/native_dict_host.c native_dict_host 'native-dicts: ok'
          run_host tests/native_list_host.c native_list_host 'native-lists: ok'
          run_host tests/native_handle_host.c native_handle_host 'opaque-floats: ok'
          run_host tests/native_import_host.c native_import_host 'native-host-imports: ok'
          run_host tests/native_traceback_host.c native_traceback_host 'native-traceback-frames: ok'
          run_host tests/native_full_runtime_host.c native_full_runtime_host 'native-full-runtime: ok'
          python tests/native_environment_adapter_probe.py dist/libportapy.so
          python tests/native_traceback_adapter_probe.py dist/libportapy.so
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-native-host-calls
          path: dist

  windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install native toolchain and asmpython
        shell: powershell
        run: |
          choco install nasm mingw -y --no-progress
          python -m pip install --no-cache-dir --force-reinstall `
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
      - name: Prepare standalone VM implementation
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          python tools/prepare_standalone_native_sources.py *>&1 | Tee-Object -FilePath dist/prepare.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Audit generated standalone entry
        shell: powershell
        run: |
          python tools/audit_standalone_generated_entry.py `
            --target windows `
            --output dist/generated-standalone-windows.py `
            *>&1 | Tee-Object -FilePath dist/audit.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Build host-call library over standalone VM
        shell: powershell
        run: |
          python tools/build_native_host_calls.py `
            --standalone-vm `
            --target windows `
            --output dist/portapy.dll `
            --work-dir dist/build-windows `
            *>&1 | Tee-Object -FilePath dist/build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Prove Windows artifact has no Python runtime dependency
        shell: powershell
        run: |
          $imports = & objdump -p dist/portapy.dll
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $imports | Out-File -Encoding utf8 dist/windows-imports.txt
          if ($imports -match 'DLL Name:\s*(python|libpython)[^\s]*\.dll') {
            throw 'standalone library must not load or link a Python DLL'
          }
      - name: Execute complete Windows release matrix
        shell: powershell
        run: |
          function Run-Host($source, $binary, $expected) {
            gcc -std=c11 -Wall -Wextra -Werror -Iinclude $source -o "dist/$binary.exe"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            $output = & "dist/$binary.exe" dist/portapy.dll
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            $output | Out-File -Encoding utf8 "dist/$binary-output.txt"
            if ($output -ne $expected) { throw "unexpected $binary output: $output" }
          }
          Run-Host tests/native_host_call_host.c native_host_call_host 'native-host-calls: ok'
          Run-Host tests/native_full_environment_host.c native_full_environment_host 'native-full-environment: ok'
          Run-Host tests/native_tuple_host.c native_tuple_host 'native-tuples: ok'
          Run-Host tests/native_dict_host.c native_dict_host 'native-dicts: ok'
          Run-Host tests/native_list_host.c native_list_host 'native-lists: ok'
          Run-Host tests/native_handle_host.c native_handle_host 'opaque-floats: ok'
          Run-Host tests/native_import_host.c native_import_host 'native-host-imports: ok'
          Run-Host tests/native_traceback_host.c native_traceback_host 'native-traceback-frames: ok'
          Run-Host tests/native_full_runtime_host.c native_full_runtime_host 'native-full-runtime: ok'
          python tests/native_environment_adapter_probe.py dist/portapy.dll
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tests/native_traceback_adapter_probe.py dist/portapy.dll
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-native-host-calls
          path: dist
