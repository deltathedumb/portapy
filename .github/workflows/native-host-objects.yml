name: Native host object probe

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install native toolchain and asmpython
        run: |
          sudo apt-get update
          sudo apt-get install --yes nasm gcc binutils
          python -m pip install --no-cache-dir --force-reinstall \
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
      - name: Build host-object library
        run: |
          python tools/build_native_host.py \
            --target linux \
            --output dist/libportapy-host.so \
            --work-dir dist/build-host-linux
      - name: Execute host-object bridge from C
        run: |
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_host_object_host.c -ldl -o dist/native_host_object_host
          ./dist/native_host_object_host ./dist/libportapy-host.so \
            | tee dist/native-host-output.txt
          grep -qx 'native-host-objects: ok' dist/native-host-output.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-native-host-objects
          path: dist

  windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install native toolchain and asmpython
        shell: powershell
        run: |
          choco install nasm mingw -y --no-progress
          python -m pip install --no-cache-dir --force-reinstall `
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
      - name: Build host-object library
        shell: powershell
        run: |
          python tools/build_native_host.py `
            --target windows `
            --output dist/portapy-host.dll `
            --work-dir dist/build-host-windows
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Execute host-object bridge from C
        shell: powershell
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude `
            tests/native_host_object_host.c -o dist/native_host_object_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output = & dist/native_host_object_host.exe dist/portapy-host.dll
          $output | Out-File -Encoding utf8 dist/native-host-output.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($output -ne 'native-host-objects: ok') {
            throw "unexpected native host output: $output"
          }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-native-host-objects
          path: dist
