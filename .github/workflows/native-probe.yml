name: Native shared-library probe

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install native toolchain and asmpython
        run: |
          sudo apt-get update
          sudo apt-get install --yes nasm gcc binutils
          python -m pip install --no-cache-dir --force-reinstall \
            'git+https://github.com/deltathedumb/asmpython.git@beta'
      - name: Compile Python source and link libportapy_probe.so
        shell: bash
        run: |
          mkdir -p dist
          set +e
          set -o pipefail
          python -m asmpython build src/portapy/native_probe.py \
            --target linux --type library --backend legacy \
            --no-pyinbin-fallback -o dist/libportapy_probe.so \
            2>&1 | tee dist/linux-build.log
          compiler_status=${PIPESTATUS[0]}
          set -e

          if [ ! -f dist/libportapy_probe.asm ]; then
            exit "$compiler_status"
          fi

          python tools/nasm_exports.py dist/libportapy_probe.asm \
            --export portapy_abi_version \
            --export portapy_opcode_probe
          python tools/elf_pic.py dist/libportapy_probe.asm
          nasm -f elf64 -w-label-redef-late \
            dist/libportapy_probe.asm -o dist/libportapy_probe.o
          cat > dist/portapy_probe.map <<'MAP'
          {
            global:
              portapy_abi_version;
              portapy_opcode_probe;
            local: *;
          };
          MAP
          gcc -shared dist/libportapy_probe.o -o dist/libportapy_probe.so \
            -Wl,--version-script=dist/portapy_probe.map
      - name: Inspect and execute through an external C host
        run: |
          file dist/libportapy_probe.so
          readelf -dW dist/libportapy_probe.so | tee dist/linux-dynamic.txt
          if readelf -dW dist/libportapy_probe.so | grep -q TEXTREL; then
            echo 'text relocations are forbidden'
            exit 1
          fi
          nm -D --defined-only dist/libportapy_probe.so | tee dist/linux-exports.txt
          awk '{print $3}' dist/linux-exports.txt | grep '^portapy_' | sort > dist/linux-portapy-symbols.txt
          printf 'portapy_abi_version\nportapy_opcode_probe\n' > dist/expected-symbols.txt
          diff -u dist/expected-symbols.txt dist/linux-portapy-symbols.txt
          if awk '{print $3}' dist/linux-exports.txt | grep -qx main; then
            echo 'main must not be public'
            exit 1
          fi
          cc -std=c11 -Wall -Wextra -Werror tests/native_probe_host.c -ldl -o dist/native_probe_host
          ./dist/native_probe_host ./dist/libportapy_probe.so | tee dist/linux-host-output.txt
          grep -qx 'abi=1 opcode=10' dist/linux-host-output.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: linux-native-probe
          path: dist

  windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install native toolchain and asmpython
        shell: powershell
        run: |
          choco install nasm mingw -y --no-progress
          python -m pip install --no-cache-dir --force-reinstall `
            'git+https://github.com/deltathedumb/asmpython.git@beta'
      - name: Compile Python source and link portapy_probe.dll
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          python -m asmpython build src/portapy/native_probe.py `
            --target windows --type library --backend legacy `
            --no-pyinbin-fallback -o dist/portapy_probe.dll `
            *>&1 | Tee-Object -FilePath dist/windows-build.log
          $compilerExit = $LASTEXITCODE

          if (-not (Test-Path dist/portapy_probe.asm)) {
            exit $compilerExit
          }
          python tools/nasm_exports.py dist/portapy_probe.asm `
            --export portapy_abi_version `
            --export portapy_opcode_probe
          nasm -f win64 -w-label-redef-late `
            dist/portapy_probe.asm -o dist/portapy_probe.obj
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          @'
          LIBRARY portapy_probe
          EXPORTS
              portapy_abi_version
              portapy_opcode_probe
          '@ | Set-Content -Encoding ascii dist/portapy_probe.def
          gcc -shared dist/portapy_probe.obj dist/portapy_probe.def `
            -o dist/portapy_probe.dll
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Inspect and execute through an external C host
        shell: powershell
        run: |
          objdump -p dist/portapy_probe.dll | Out-File -Encoding utf8 dist/windows-exports.txt
          if (-not (Select-String -Path dist/windows-exports.txt -Pattern 'portapy_abi_version' -Quiet)) { throw 'missing portapy_abi_version' }
          if (-not (Select-String -Path dist/windows-exports.txt -Pattern 'portapy_opcode_probe' -Quiet)) { throw 'missing portapy_opcode_probe' }
          gcc -std=c11 -Wall -Wextra -Werror tests/native_probe_host.c -o dist/native_probe_host.exe
          $output = & dist/native_probe_host.exe dist/portapy_probe.dll
          $output | Out-File -Encoding utf8 dist/windows-host-output.txt
          if ($output -ne 'abi=1 opcode=10') { throw "unexpected host output: $output" }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-native-probe
          path: dist
