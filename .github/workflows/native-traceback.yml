name: Native traceback frames

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install toolchain and asmpython
        run: |
          sudo apt-get update
          sudo apt-get install --yes nasm gcc binutils
          python -m pip install --no-cache-dir --force-reinstall \
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
          python -m pip install -e '.[test]'
      - name: Test generated traceback semantics
        run: python -m pytest tests/test_rewrite_generated_traceback.py
      - name: Build native library
        run: |
          python tools/build_native_host_calls.py \
            --target linux \
            --output dist/libportapy.so \
            --work-dir dist/build-traceback-linux
      - name: Exercise traceback frame ABI
        run: |
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_traceback_host.c -ldl -o dist/native_traceback_host
          ./dist/native_traceback_host ./dist/libportapy.so \
            | tee dist/traceback-output.txt
          grep -qx 'native-traceback-frames: ok' dist/traceback-output.txt
      - name: Exercise traceback Python facade
        run: |
          python tests/native_traceback_adapter_probe.py ./dist/libportapy.so \
            | tee dist/traceback-adapter-output.txt
          grep -qx 'native-traceback-adapter: ok' dist/traceback-adapter-output.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: native-traceback-linux
          path: dist

  windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install toolchain and asmpython
        shell: powershell
        run: |
          choco install nasm mingw -y --no-progress
          python -m pip install --no-cache-dir --force-reinstall `
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
          python -m pip install -e '.[test]'
      - name: Test generated traceback semantics
        shell: powershell
        run: python -m pytest tests/test_rewrite_generated_traceback.py
      - name: Build native library
        shell: powershell
        run: |
          python tools/build_native_host_calls.py `
            --target windows `
            --output dist/portapy.dll `
            --work-dir dist/build-traceback-windows
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Exercise traceback frame ABI
        shell: powershell
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude `
            tests/native_traceback_host.c -o dist/native_traceback_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output = @(& dist/native_traceback_host.exe dist/portapy.dll)
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output | Out-File -Encoding utf8 dist/traceback-output.txt
          if ($output[-1] -ne 'native-traceback-frames: ok') {
            throw "unexpected traceback output: $($output -join [Environment]::NewLine)"
          }
      - name: Exercise traceback Python facade
        shell: powershell
        run: |
          $output = @(python tests/native_traceback_adapter_probe.py dist/portapy.dll)
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output | Out-File -Encoding utf8 dist/traceback-adapter-output.txt
          if ($output[-1] -ne 'native-traceback-adapter: ok') {
            throw "unexpected traceback adapter output: $($output -join [Environment]::NewLine)"
          }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: native-traceback-windows
          path: dist
