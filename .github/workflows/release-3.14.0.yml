name: Build and release PortaPy 3.14.0

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: Publish 3.14.0 after every native gate passes
        required: true
        type: boolean
        default: false
  push:
    branches:
      - release/3.14.0

concurrency:
  group: portapy-3.14.0-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package and native toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --yes nasm gcc binutils
          python -m pip install -e '.[test]'
          python -m pip install --no-cache-dir --force-reinstall \
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
      - name: Build full libportapy.so
        run: |
          mkdir -p dist
          set -o pipefail
          python tools/build_native_typed.py \
            --target linux \
            --output dist/libportapy.so \
            --work-dir dist/build-linux \
            2>&1 | tee dist/build-linux.log
      - name: Validate Linux stable artifact
        run: |
          readelf -dW dist/libportapy.so | tee dist/linux-dynamic-section.txt
          ldd dist/libportapy.so | tee dist/linux-dependencies.txt
          if grep -Eiq 'NEEDED.*(lib)?python|(^|[[:space:]/])libpython[0-9]' \
              dist/linux-dynamic-section.txt dist/linux-dependencies.txt; then
            echo 'standalone library must not load or link libpython'
            exit 1
          fi
          if readelf -dW dist/libportapy.so | grep -q TEXTREL; then
            echo 'text relocations are forbidden'
            exit 1
          fi
          python tools/run_native_release_conformance.py \
            dist/libportapy.so \
            --output-dir dist/conformance-linux
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: portapy-linux-3.14.0
          path: |
            dist/build-linux.log
            dist/libportapy.so
            dist/libportapy.so.json
            dist/linux-dynamic-section.txt
            dist/linux-dependencies.txt
            dist/conformance-linux

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package and native toolchain
        shell: powershell
        run: |
          & .\tools\install_windows_toolchain.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python -m pip install -e '.[test]'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $compiler = 'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
          $compilerInstalled = $false
          for ($attempt = 1; $attempt -le 3; $attempt += 1) {
            Write-Host "Installing pinned asmpython (attempt $attempt/3)"
            python -m pip install --no-cache-dir --force-reinstall $compiler
            if ($LASTEXITCODE -eq 0) {
              $compilerInstalled = $true
              break
            }
            if ($attempt -lt 3) { Start-Sleep -Seconds (10 * $attempt) }
          }
          if (-not $compilerInstalled) { exit 1 }
      - name: Build full portapy.dll
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $output = & python tools/build_native_typed.py `
            --target windows `
            --output dist/portapy.dll `
            --work-dir dist/build-windows `
            2>&1
          $buildStatus = $LASTEXITCODE
          $output | Tee-Object -FilePath dist/build-windows.log
          if ($buildStatus -ne 0) { exit $buildStatus }
      - name: Validate Windows stable artifact
        shell: powershell
        run: |
          $imports = & objdump -p dist/portapy.dll
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $imports | Out-File -Encoding utf8 dist/windows-imports.txt
          if ($imports -match 'DLL Name:\s*(python|libpython)[^\s]*\.dll') {
            throw 'standalone library must not load or link a Python DLL'
          }
          python tools/run_native_release_conformance.py `
            dist/portapy.dll `
            --compiler gcc `
            --output-dir dist/conformance-windows
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: portapy-windows-3.14.0
          path: |
            dist/build-windows.log
            dist/portapy.dll
            dist/portapy.dll.json
            dist/windows-imports.txt
            dist/conformance-windows

  publish:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
    needs: [linux, windows]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist-download
      - name: Assemble release directory
        run: |
          mkdir -p dist
          cp dist-download/portapy-linux-3.14.0/libportapy.so dist/
          cp dist-download/portapy-linux-3.14.0/libportapy.so.json dist/
          cp dist-download/portapy-windows-3.14.0/portapy.dll dist/
          cp dist-download/portapy-windows-3.14.0/portapy.dll.json dist/
      - name: Validate metadata and checksums
        run: |
          PYTHONPATH="$PWD" python tools/release_gate.py dist \
            --expected-tag 3.14.0
          cp include/portapy.h dist/portapy.h
          cp LICENSE dist/LICENSE.txt
          cp RELEASE_STATUS.json dist/RELEASE_STATUS.json
      - name: Publish PortaPy 3.14.0
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view 3.14.0 >/dev/null 2>&1; then
            echo 'GitHub release 3.14.0 already exists; refusing to replace it.'
            exit 1
          fi
          gh release create 3.14.0 \
            dist/libportapy.so \
            dist/libportapy.so.json \
            dist/portapy.dll \
            dist/portapy.dll.json \
            dist/portapy.h \
            dist/LICENSE.txt \
            dist/RELEASE_STATUS.json \
            dist/checksums.json \
            dist/release-manifest.json \
            --target "$GITHUB_SHA" \
            --title 'PortaPy 3.14.0' \
            --notes-file dist/RELEASE_NOTES.md
