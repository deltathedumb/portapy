name: Build and release 3.14
on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the GitHub release after all native gates pass
        required: true
        type: boolean
        default: false
permissions:
  contents: write
jobs:
  native:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux
            artifact: libportapy.so
          - os: windows-2025
            target: windows
            artifact: portapy.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install asmpython beta
        run: python -m pip install 'git+https://github.com/deltathedumb/asmpython.git@beta'
      - name: Build genuine PortaPy shared library
        shell: bash
        run: |
          test -f src/portapy/native_api.py || { echo 'native_api.py is not implemented; refusing placeholder release'; exit 1; }
          mkdir -p dist
          python -m asmpython build src/portapy/native_api.py --target ${{ matrix.target }} --type library --no-pyinbin-fallback -o dist/${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-native
          path: dist/${{ matrix.artifact }}
  publish:
    if: ${{ inputs.publish }}
    needs: native
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: python tools/release_gate.py dist
      - run: cp include/portapy.h dist/portapy.h
      - name: Publish 3.14
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create 3.14 dist/* --title 'PortaPy 3.14' --notes 'First fully Python-built PortaPy shared-library release.'
