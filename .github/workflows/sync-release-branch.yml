name: Sync release branch with main

on:
  push:
    branches: [release/full-runtime-promotion]
    paths:
      - .github/workflows/sync-release-branch.yml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/full-runtime-promotion
          fetch-depth: 0
      - name: Merge current main into release branch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit -X ours origin/main
          git push origin HEAD:release/full-runtime-promotion
