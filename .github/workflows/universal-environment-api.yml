name: Universal environment API

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install toolchain and package
        run: |
          sudo apt-get update
          sudo apt-get install --yes nasm gcc binutils
          python -m pip install --no-cache-dir --force-reinstall \
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
          python -m pip install -e . pytest
      - name: Test hosted helper API
        run: python -m pytest tests/test_environment_api.py
      - name: Build shared library
        run: |
          python tools/build_native_typed.py \
            --target linux \
            --output dist/libportapy.so \
            --work-dir dist/build-universal-linux
      - name: Test universal and low-level ABI together
        run: |
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_environment_api_host.c -ldl \
            -o dist/native_environment_api_host
          ./dist/native_environment_api_host ./dist/libportapy.so \
            | tee dist/universal-environment-output.txt
          grep -qx 'Hello, world!' dist/universal-environment-output.txt
          tail -n 1 dist/universal-environment-output.txt \
            | grep -qx 'universal-environment-api: ok'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: universal-environment-linux
          path: dist

  windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install toolchain and package
        shell: powershell
        run: |
          choco install nasm mingw -y --no-progress
          python -m pip install --no-cache-dir --force-reinstall `
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
          python -m pip install -e . pytest
      - name: Test hosted helper API
        shell: powershell
        run: python -m pytest tests/test_environment_api.py
      - name: Build shared library
        shell: powershell
        run: |
          python tools/build_native_typed.py `
            --target windows `
            --output dist/portapy.dll `
            --work-dir dist/build-universal-windows
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Test universal and low-level ABI together
        shell: powershell
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude `
            tests/native_environment_api_host.c `
            -o dist/native_environment_api_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output = @(& dist/native_environment_api_host.exe dist/portapy.dll)
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output | Out-File -Encoding utf8 dist/universal-environment-output.txt
          if ($output[0] -ne 'Hello, world!') {
            throw "unexpected callback output: $($output -join [Environment]::NewLine)"
          }
          if ($output[-1] -ne 'universal-environment-api: ok') {
            throw "unexpected final output: $($output -join [Environment]::NewLine)"
          }
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: universal-environment-windows
          path: dist
