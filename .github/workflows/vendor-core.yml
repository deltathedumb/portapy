name: Sync pyinbin core

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: asmpython branch, tag, or commit to review
        required: true
        default: beta

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch candidate reusable core
        shell: bash
        run: |
          rm -rf .vendor-asmpython
          git clone https://github.com/deltathedumb/asmpython.git .vendor-asmpython
          git -C .vendor-asmpython checkout '${{ inputs.upstream_ref }}'
          mkdir -p .candidate-core
          cp .vendor-asmpython/asmpython/pyinbin/bytecode.py .candidate-core/bytecode.py
          cp .vendor-asmpython/asmpython/pyinbin/frontend.py .candidate-core/frontend.py
          cp .vendor-asmpython/asmpython/pyinbin/vm.py .candidate-core/vm.py
          git -C .vendor-asmpython rev-parse HEAD > .candidate-core/UPSTREAM_SHA
          rm -rf .vendor-asmpython
      - name: Show reviewed divergence
        shell: bash
        run: |
          diff -ru src/portapy/core .candidate-core || true
          echo 'Automatic replacement is intentionally disabled.'
          echo 'Apply reviewed semantic changes manually so PortaPy-specific native-compatibility fixes are preserved.'
      - uses: actions/upload-artifact@v4
        with:
          name: candidate-pyinbin-core
          path: .candidate-core
