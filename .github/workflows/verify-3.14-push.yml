name: Verify PortaPy 3.14 exact head

on:
  push:
    branches: [finish-3.14-runtime]
  workflow_dispatch:

concurrency:
  group: portapy-3.14-exact-head
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  hosted:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PortaPy
        run: python -m pip install -e '.[test]'
      - name: Run complete hosted suite
        run: python -m pytest
      - name: Validate release metadata tests
        run: python -m pytest tests/test_release_gate.py tests/test_generated_standalone_runtime.py

  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux
            library: dist/libportapy.so
          - os: windows-2025
            target: windows
            library: dist/portapy.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PortaPy and pinned asmpython
        shell: bash
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes nasm gcc binutils
          python -m pip install -e '.[test]'
          python -m pip install --no-cache-dir --force-reinstall \
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
      - name: Install PortaPy and pinned asmpython
        shell: powershell
        if: matrix.target == 'windows'
        run: |
          choco install nasm mingw -y --no-progress
          python -m pip install -e '.[test]'
          python -m pip install --no-cache-dir --force-reinstall `
            'git+https://github.com/deltathedumb/asmpython.git@376cf9422c28123673a1dedd7dd66b845f3c5ed1'
      - name: Build canonical standalone VM
        shell: bash
        if: matrix.target == 'linux'
        run: |
          mkdir -p dist
          python tools/build_native_typed.py \
            --target linux \
            --output dist/libportapy.so \
            --work-dir dist/build-verify-linux
      - name: Build canonical standalone VM
        shell: powershell
        if: matrix.target == 'windows'
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          python tools/build_native_typed.py `
            --target windows `
            --output dist/portapy.dll `
            --work-dir dist/build-verify-windows
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Run canonical C host and linkage audit
        shell: bash
        if: matrix.target == 'linux'
        run: |
          if readelf -dW dist/libportapy.so | grep -Ei 'libpython|python3'; then
            echo 'CPython linkage is forbidden'
            exit 1
          fi
          if readelf -dW dist/libportapy.so | grep -q TEXTREL; then
            echo 'text relocations are forbidden'
            exit 1
          fi
          cc -std=c11 -Wall -Wextra -Werror -Iinclude \
            tests/native_full_runtime_host.c -ldl \
            -o dist/native_full_runtime_host
          env -i PATH="$PATH" HOME="$HOME" \
            ./dist/native_full_runtime_host ./dist/libportapy.so \
            | tee dist/native-output.txt
          grep -qx 'native-full-runtime: ok' dist/native-output.txt
      - name: Run canonical C host and linkage audit
        shell: powershell
        if: matrix.target == 'windows'
        run: |
          $imports = (& objdump -p dist/portapy.dll | Out-String)
          if ($imports -match '(?i)python3|python\.dll') {
            throw 'CPython linkage is forbidden'
          }
          gcc -std=c11 -Wall -Wextra -Werror -Iinclude `
            tests/native_full_runtime_host.c `
            -o dist/native_full_runtime_host.exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output = & dist/native_full_runtime_host.exe dist/portapy.dll
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $output | Out-File -Encoding utf8 dist/native-output.txt
          if ($output -ne 'native-full-runtime: ok') {
            throw "unexpected native output: $output"
          }
      - name: Run native Python facade tests
        run: python tests/native_traceback_adapter_probe.py ${{ matrix.library }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verify-${{ matrix.target }}
          path: dist

  report:
    if: always()
    needs: [hosted, native]
    runs-on: ubuntu-24.04
    steps:
      - name: Publish exact-head status to PR
        env:
          GH_TOKEN: ${{ github.token }}
          VERIFY_SHA: ${{ github.sha }}
          VERIFY_RUN_ID: ${{ github.run_id }}
          HOSTED_RESULT: ${{ needs.hosted.result }}
          NATIVE_RESULT: ${{ needs.native.result }}
        run: |
          gh pr view 46 --repo "${{ github.repository }}" --json body --jq .body > /tmp/pr-body.md
          python - <<'PY'
          import os
          from pathlib import Path

          path = Path('/tmp/pr-body.md')
          body = path.read_text(encoding='utf-8')
          start = '<!-- portapy-exact-head-verification -->'
          end = '<!-- /portapy-exact-head-verification -->'
          block = f'''{start}
          ### Exact-head verification

          - Commit: `{os.environ["VERIFY_SHA"]}`
          - Workflow run: `{os.environ["VERIFY_RUN_ID"]}`
          - Hosted suite: **{os.environ["HOSTED_RESULT"]}**
          - Native Linux/Windows matrix: **{os.environ["NATIVE_RESULT"]}**
          {end}'''
          if start in body and end in body:
              before, rest = body.split(start, 1)
              _, after = rest.split(end, 1)
              body = before.rstrip() + '\n\n' + block + after
          else:
              body = body.rstrip() + '\n\n' + block + '\n'
          path.write_text(body, encoding='utf-8')
          PY
          gh pr edit 46 --repo "${{ github.repository }}" --body-file /tmp/pr-body.md
